version: '1.0.{build}'

environment:
  matrix:
    - PYTHON: "C:\\Python310-x64"

install:
  - "SET PATH=%PYTHON%;%PYTHON%\\Scripts;%PATH%"
  - "python --version"
  - "python -m pip install --upgrade pip"
  - "python -m pip install -r requirements.txt"
  - "python -m pip install pyinstaller"

build_script:
  - "pyinstaller --onefile --windowed --name CrawlerTool --add-data config.example.yaml;. --add-data 使用说明书.md;. --add-data 部署教程.md;. main.py"

after_build:
  - "copy config.example.yaml dist\\"
  - "copy 使用说明书.md dist\\"
  - "copy 部署教程.md dist\\"
  - "copy create_watch_template.py dist\\"

artifacts:
  - path: dist\*
    name: CrawlerTool

test: off
