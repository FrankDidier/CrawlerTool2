version: '1.0.{build}'

environment:
  matrix:
    - PYTHON: "C:\\Python310-x64"

install:
  - "SET PATH=%PYTHON%;%PYTHON%\\Scripts;%PATH%"
  - "python --version"
  - "python -m pip install --upgrade pip"
  - "python -m pip install -r requirements.txt"
  - "python -m playwright install chromium"
  - "python -m pip install pyinstaller"

build_script:
  - "pyinstaller --onefile --windowed --name CrawlerTool --add-data config.example.yaml;. main.py"

after_build:
  - "copy config.example.yaml dist\\"
  - "copy create_watch_template.py dist\\"
  - "copy *.md dist\\"
  - "python -c \"import shutil,glob; [shutil.copy(f,'dist/') for f in glob.glob('*.md')+glob.glob('*.txt')]\""

artifacts:
  - path: dist\*
    name: CrawlerTool

test: off
