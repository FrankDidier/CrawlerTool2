version: '1.0.{build}'

environment:
  matrix:
    - PYTHON: "C:\\Python310-x64"

install:
  - "SET PATH=%PYTHON%;%PYTHON%\\Scripts;%PATH%"
  - "python --version"
  - "python -m pip install --upgrade pip"
  - "python -m pip install -r requirements.txt"
  - "python -m playwright install chromium"
  - "python -m pip install pyinstaller"

build_script:
  - "pyinstaller --onefile --windowed --name CrawlerTool --add-data config.example.yaml;. main.py"

after_build:
  - "copy config.example.yaml dist\\"
  - "copy create_watch_template.py dist\\"
  - "python -c \"import shutil,pathlib; [shutil.copy(str(f),'dist/'+{'使用说明书':'UserManual','部署教程':'DeployGuide'}.get(f.stem,f.stem)+f.suffix) for f in pathlib.Path('.').glob('*.md') if f.stem!='README']\""
  - "copy README.md dist\\"

artifacts:
  - path: dist\CrawlerTool.exe
    name: CrawlerTool.exe
  - path: dist\config.example.yaml
    name: config.example.yaml
  - path: dist\README.md
    name: README.md
  - path: dist\UserManual.md
    name: UserManual.md
  - path: dist\DeployGuide.md
    name: DeployGuide.md
  - path: dist\create_watch_template.py
    name: create_watch_template.py

test: off
